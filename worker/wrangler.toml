# Rainmap API — Cloudflare Workers
# 1) KV: wrangler kv:namespace create RADAR_KV
# 2) wrangler.toml の [[kv_namespaces]] id を差し替え
# 3) API の公開 URL を VITE_API_BASE_URL（Web）と API_PUBLIC_ORIGIN（Worker）に設定

name = "rainmap-api"
main = "src/index.ts"
compatibility_date = "2024-11-01"

[triggers]
crons = ["*/5 * * * *"]

[vars]
ENVIRONMENT = "development"
# カンマ区切り。GitHub Pages の実 URL を列挙（末尾スラッシュなしでも可）
ALLOWED_ORIGINS = "http://localhost:5173,http://127.0.0.1:5173"
FAKE_PROVIDER = "false"
ZOOM_MIN = "4"
ZOOM_MAX = "10"
# 本番では Workers のカスタムドメイン等の確定オリジンを設定推奨
# API_PUBLIC_ORIGIN = "https://rainmap-api.example.com"

# 初回: wrangler kv:namespace create RADAR_KV の id を貼る
[[kv_namespaces]]
binding = "RADAR_KV"
id = "00000000000000000000000000000000"
preview_id = "00000000000000000000000000000000"
