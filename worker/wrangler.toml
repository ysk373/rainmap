# Rainmap API — Cloudflare Workers
# 1) KV: wrangler kv:namespace create RADAR_KV
# 2) wrangler.toml の [[kv_namespaces]] id を差し替え
# 3) API の公開 URL を VITE_API_BASE_URL（Web）と API_PUBLIC_ORIGIN（Worker）に設定

name = "rainmap-api"
main = "src/index.ts"
compatibility_date = "2024-11-01"

[triggers]
crons = ["*/5 * * * *"]

[vars]
ENVIRONMENT = "production"
# カンマ区切り。GitHub Pages の実 URL を列挙（末尾スラッシュなしでも可）
ALLOWED_ORIGINS = "https://ysk373.github.io"
FAKE_PROVIDER = "false"
ZOOM_MIN = "4"
ZOOM_MAX = "10"
# 本番では Workers のカスタムドメイン等の確定オリジンを設定推奨
API_PUBLIC_ORIGIN = "https://rainmap-api.ysk373.workers.dev"

# 初回: wrangler kv:namespace create RADAR_KV の id を貼る
[[kv_namespaces]]
binding = "RADAR_KV"
id = "39b9b1dfa4b74634a95187f32ff87f5b"
preview_id = "2344873c779343fcb0bf01b769bb0312"
