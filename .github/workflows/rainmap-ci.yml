name: rainmap CI

on:
  push:
    paths:
      - "worker/**"
      - "web/**"
      - ".github/workflows/rainmap-ci.yml"
  pull_request:
    paths:
      - "worker/**"
      - "web/**"
      - ".github/workflows/rainmap-ci.yml"

jobs:
  worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - name: Install
        run: npm install
      - name: Typecheck
        run: npm run typecheck

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        run: npm install
      - name: Build
        env:
          VITE_API_BASE_URL: https://example.com
          VITE_BASE_PATH: /
        run: npm run build
