<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rainmap</title>
  </head>
  <body>
    <div id="app">
      <header class="bar">
        <h1>Rainmap</h1>
        <p id="status" class="status" role="status" aria-live="polite">読み込み中…</p>
      </header>
      <div id="map"></div>
      <footer class="bar foot">
        <p id="attr" class="attr"></p>
        <div class="controls">
          <button type="button" id="btn-prev" aria-label="前のフレーム">|◀</button>
          <button type="button" id="btn-play" aria-label="再生/停止" aria-pressed="false">▶</button>
          <button type="button" id="btn-next" aria-label="次のフレーム">▶|</button>
          <span id="frame-label" class="frame-label" aria-live="polite"></span>
        </div>
      </footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
