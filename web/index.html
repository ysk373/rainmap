<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rainmap</title>
  </head>
  <body>
    <div id="app">
      <header class="bar">
        <div class="bar-top">
          <h1>Rainmap</h1>
          <form class="address-search" id="address-search-form" role="search">
            <label class="visually-hidden" for="address-input">住所・地名検索</label>
            <input
              id="address-input"
              class="address-input"
              type="search"
              name="q"
              enterkeyhint="search"
              placeholder="住所・地名を入力"
              autocomplete="off"
            />
            <button type="submit" class="address-submit">検索</button>
          </form>
        </div>
        <ul id="address-results" class="address-results" role="listbox" hidden></ul>
        <p id="address-search-status" class="address-search-status" role="status" aria-live="polite"></p>
        <p id="status" class="status" role="status" aria-live="polite">読み込み中…</p>
      </header>
      <div id="map"></div>
      <footer class="bar foot">
        <p id="attr" class="attr"></p>
        <div class="controls">
          <button type="button" id="btn-prev" aria-label="前のフレーム">◀</button>
          <button type="button" id="btn-play" class="btn-play" aria-label="再生/停止" aria-pressed="false">再生</button>
          <button type="button" id="btn-next" aria-label="次のフレーム">▶</button>
          <span id="frame-label" class="frame-label" aria-live="polite"></span>
        </div>
      </footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
